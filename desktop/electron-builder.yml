appId: com.safemarket.optimiseur
productName: SafeMarket Optimiseur
copyright: Copyright © 2026 SafeMarket

directories:
  buildResources: build
  output: release

# Mises à jour automatiques via GitHub Releases (electron-updater).
# releaseType: release -> publie une vraie release (pas un brouillon),
# pour que /releases/latest/download fonctionne en téléchargement direct.
publish:
  provider: github
  owner: tozt498-cmd
  repo: Safe
  releaseType: release

files:
  - out/**
  - '!**/*.map'

asarUnpack:
  - '**/node_modules/systeminformation/**'

extraResources:
  - from: build/icon.png
    to: icon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  # Nom FIXE (sans version) -> lien direct stable: /releases/latest/download/SafeMarket-Optimiseur-Setup.exe
  artifactName: SafeMarket-Optimiseur-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SafeMarket Optimiseur
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
