name: Build Windows installer

on:
  workflow_dispatch: {} # bouton "Run workflow" dans l'onglet Actions
  push:
    tags:
      - 'v*' # ou pousser un tag (ex. v1.0.0) pour créer une Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build installer (.exe)
        working-directory: desktop
        run: npm run dist
        env:
          # Pas de signature de code (certificat payant non requis pour démarrer).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeMarket-Optimiseur-Setup
          path: desktop/release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release (sur tag v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.exe
