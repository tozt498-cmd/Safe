name: Build Windows installer

on:
  workflow_dispatch: {} # bouton "Run workflow" dans l'onglet Actions
  push:
    tags:
      - 'v*' # ou pousser un tag (ex. v1.0.0) pour créer une Release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build & publish installer (.exe + latest.yml pour l'auto-update)
        working-directory: desktop
        run: npm run release
        env:
          # Pas de signature de code (certificat payant non requis pour démarrer).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # electron-builder publie la Release GitHub (exe, blockmap, latest.yml).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact (sauvegarde)
        uses: actions/upload-artifact@v4
        with:
          name: SafeMarket-Optimiseur-Setup
          path: desktop/release/*.exe
          if-no-files-found: error
